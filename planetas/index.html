<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador del Sistema Solar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #4a90e2;
            max-width: 300px;
        }
        
        #planetInfo {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 20px;
            max-width: 350px;
            z-index: 200;
            display: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            cursor: move;
            user-select: none;
        }
        
        #planetInfo.dragging {
            opacity: 0.8;
            transform: scale(1.02);
        }
        
        #planetInfo .drag-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            cursor: move;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 13px 13px 0 0;
        }
        
        #planetInfo h2 {
            margin-top: 0;
            color: #ffd700;
            text-align: center;
        }
        
        #planetInfo .close {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
            color: #ff6b6b;
        }
        
        .planet-detail {
            margin: 8px 0;
            line-height: 1.4;
        }
        
        .planet-detail strong {
            color: #4a90e2;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #4a90e2;
            min-width: 250px;
        }
        
        .speed-control {
            margin: 10px 0;
            color: white;
        }
        
        .speed-control label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .speed-slider {
            width: 100%;
            margin: 5px 0;
        }
        
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="info">
        <h3>🌌 Explorador del Sistema Solar</h3>
        <p>Haz clic en cualquier planeta para ver información detallada</p>
        <p>Usa el ratón para rotar la vista</p>
        <p>Rueda del ratón para acercar/alejar</p>
    </div>
    
    <div id="planetInfo">
        <div class="drag-header"></div>
        <span class="close" onclick="closePlanetInfo()">&times;</span>
        <h2 id="planetName"></h2>
        <div id="planetDetails"></div>
    </div>
    
    <div id="controls">
        <button onclick="resetCamera()">Restablecer Vista</button>
        <button onclick="stopFollowing()">Dejar de Seguir</button>
        <button onclick="toggleAnimation()">Pausar/Reanudar</button>
        <div class="speed-control">
            <label for="speedSlider">Velocidad del Tiempo: <span id="speedValue">1x</span></label>
            <input type="range" id="speedSlider" class="speed-slider" min="0.1" max="5" step="0.1" value="1" oninput="updateTimeSpeed(this.value)">
        </div>
    </div>

        function init() {
            // Crear escena
            scene = new THREE.Scene();
            
            // Crear cámara
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 50, 100);
            
            // Crear renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000011);
            document.getElementById('container').appendChild(renderer.domElement);
            
            // Controles de órbita
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.zoomSpeed = 1.0;
            
            // Raycaster para detección de clics
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            // Crear estrellas de fondo
            createStars();
            
            // Crear el sol
            createSun();
            
            // Crear planetas
            createPlanets();
            
            // Crear satélites
            createSatellites();
            
            // Event listeners
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('click', onMouseClick);
            
            // Drag functionality for planet info panel
            initDragFunctionality();
            
            // Iniciar animación
            animate();
        }
        
        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
            
            const starsVertices = [];
            for (let i = 0; i < 10000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                starsVertices.push(x, y, z);
            }
            
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }
        
        function createSun() {
            const geometry = new THREE.SphereGeometry(planetData.sol.radius, 32, 32);
            const loader = new THREE.TextureLoader();
            
            // Cargar textura del sol
            const texture = loader.load(planetData.sol.texture);
            const material = new THREE.MeshBasicMaterial({ 
                map: texture,
                emissive: 0xff6600,
                emissiveIntensity: 0.2
            });
            
            sun = new THREE.Mesh(geometry, material);
            sun.userData = { planetKey: 'sol' };
            scene.add(sun);
            
            // Luz del sol
            const light = new THREE.PointLight(0xffffff, 1, 0);
            light.position.set(0, 0, 0);
            scene.add(light);
            
            // Luz ambiental
            const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
            scene.add(ambientLight);
        }
        
        function createPlanets() {
            const planetKeys = ['mercurio', 'venus', 'tierra', 'marte', 'jupiter', 'saturno', 'urano', 'neptuno'];
            const loader = new THREE.TextureLoader();
            
            planetKeys.forEach(key => {
                const data = planetData[key];
                const geometry = new THREE.SphereGeometry(data.radius, 32, 32);
                
                // Cargar textura del planeta
                const texture = loader.load(data.texture);
                const material = new THREE.MeshLambertMaterial({ map: texture });
                const planet = new THREE.Mesh(geometry, material);
                
                planet.position.x = data.distance;
                planet.userData = { 
                    planetKey: key,
                    distance: data.distance,
                    speed: data.speed,
                    angle: Math.random() * Math.PI * 2
                };
                
                planets.push(planet);
                scene.add(planet);
                
                // Crear anillos para Saturno
                if (key === 'saturno') {
                    createSaturnRings(planet);
                }
                
                // Crear órbita
                createOrbit(data.distance);
            });
        }
        
        function createOrbit(radius) {
            const geometry = new THREE.RingGeometry(radius - 0.1, radius + 0.1, 64);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x444444, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.3
            });
            const orbit = new THREE.Mesh(geometry, material);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);
        }
        
        function createSaturnRings(saturnPlanet) {
            const saturnRadius = planetData.saturno.radius;
            
            // Create multiple ring segments for realistic appearance
            const ringSegments = [
                { inner: saturnRadius * 1.2, outer: saturnRadius * 1.5, opacity: 0.8 },
                { inner: saturnRadius * 1.6, outer: saturnRadius * 1.9, opacity: 0.6 },
                { inner: saturnRadius * 2.0, outer: saturnRadius * 2.2, opacity: 0.4 }
            ];
            
            ringSegments.forEach((ring, index) => {
                const geometry = new THREE.RingGeometry(ring.inner, ring.outer, 64);
                const material = new THREE.MeshLambertMaterial({
                    color: 0xccaa88,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: ring.opacity
                });
                
                const ringMesh = new THREE.Mesh(geometry, material);
                ringMesh.rotation.x = Math.PI / 2;
                ringMesh.rotation.z = Math.random() * 0.1 - 0.05; // Slight random tilt
                
                // Make rings follow Saturn
                saturnPlanet.add(ringMesh);
            });
        }
        
        function createSatellites() {
            const satelliteKeys = ['luna', 'europa', 'titan'];
            const loader = new THREE.TextureLoader();
            
            satelliteKeys.forEach(key => {
                const data = satelliteData[key];
                const geometry = new THREE.SphereGeometry(data.radius, 16, 16);
                
                // Cargar textura del satélite
                const texture = loader.load(data.texture);
                const material = new THREE.MeshLambertMaterial({ map: texture });
                const satellite = new THREE.Mesh(geometry, material);
                
                // Encontrar el planeta padre
                const parentPlanet = planets.find(p => p.userData.planetKey === data.parent);
                if (parentPlanet) {
                    satellite.position.x = parentPlanet.position.x + data.distance;
                    satellite.position.z = parentPlanet.position.z;
                    
                    satellite.userData = {
                        satelliteKey: key,
                        parentPlanet: parentPlanet,
                        distance: data.distance,
                        speed: data.speed,
                        angle: Math.random() * Math.PI * 2
                    };
                    
                    satellites.push(satellite);
                    scene.add(satellite);
                }
            });
        }
        
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            if (isAnimating) {
                // Rotar el sol
                if (sun) {
                    sun.rotation.y += 0.005 * timeSpeed;
                }
                
                // Mover planetas en órbita
                planets.forEach(planet => {
                    planet.userData.angle += planet.userData.speed * timeSpeed;
                    planet.position.x = Math.cos(planet.userData.angle) * planet.userData.distance;
                    planet.position.z = Math.sin(planet.userData.angle) * planet.userData.distance;
                    planet.rotation.y += 0.01 * timeSpeed;
                });
                
                // Mover satélites alrededor de sus planetas
                satellites.forEach(satellite => {
                    const parentPlanet = satellite.userData.parentPlanet;
                    satellite.userData.angle += satellite.userData.speed * timeSpeed;
                    
                    // Calcular posición relativa al planeta padre
                    const offsetX = Math.cos(satellite.userData.angle) * satellite.userData.distance;
                    const offsetZ = Math.sin(satellite.userData.angle) * satellite.userData.distance;
                    
                    satellite.position.x = parentPlanet.position.x + offsetX;
                    satellite.position.z = parentPlanet.position.z + offsetZ;
                    satellite.rotation.y += 0.02 * timeSpeed;
                });
            }
            
            // Update camera following if an object is being followed
            if (followingObject && !isAnimatingCamera) {
                updateFollowingCamera();
            }
            
            // Siempre actualizar controles y renderizar para mantener el zoom funcionando
            controls.update();
            renderer.render(scene, camera);
        }
        
        function onMouseClick(event) {
            // Verificar si se hizo clic dentro de la ventana de información del planeta
            const planetInfoDiv = document.getElementById('planetInfo');
            if (planetInfoDiv.style.display === 'block') {
                const rect = planetInfoDiv.getBoundingClientRect();
                const clickedInsideInfo = event.clientX >= rect.left && event.clientX <= rect.right &&
                                         event.clientY >= rect.top && event.clientY <= rect.bottom;
                
                if (!clickedInsideInfo) {
                    // Si se hizo clic fuera de la ventana de información, cerrarla
                    closePlanetInfo();
                    return;
                }
            }
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const allObjects = [sun, ...planets, ...satellites];
            const intersects = raycaster.intersectObjects(allObjects);
            
            if (intersects.length > 0) {
                const clickedObject = intersects[0].object;
                const planetKey = clickedObject.userData.planetKey;
                const satelliteKey = clickedObject.userData.satelliteKey;
                
                // Start following the clicked object
                startFollowingObject(clickedObject);
                
                if (planetKey) {
                    showPlanetInfo(planetKey, event.clientX, event.clientY);
                } else if (satelliteKey) {
                    showSatelliteInfo(satelliteKey, event.clientX, event.clientY);
                }
            }
        }
        
        function showPlanetInfo(planetKey, x, y) {
            const data = planetData[planetKey];
            const infoDiv = document.getElementById('planetInfo');
            const nameDiv = document.getElementById('planetName');
            const detailsDiv = document.getElementById('planetDetails');
            
            nameDiv.textContent = data.name;
            
            let detailsHTML = '';
            Object.entries(data.info).forEach(([key, value]) => {
                const label = key.charAt(0).toUpperCase() + key.slice(1).replace('_', ' ');
                detailsHTML += `<div class="planet-detail"><strong>${label}:</strong> ${value}</div>`;
            });
            
            detailsDiv.innerHTML = detailsHTML;
            
            // Posicionar el panel cerca del cursor
            infoDiv.style.left = Math.min(x + 20, window.innerWidth - 370) + 'px';
            infoDiv.style.top = Math.min(y + 20, window.innerHeight - 300) + 'px';
            infoDiv.style.display = 'block';
        }
        
        function closePlanetInfo() {
            document.getElementById('planetInfo').style.display = 'none';
        }
        
        function resetCamera() {
            followingObject = null;
            camera.position.set(0, 50, 100);
            controls.reset();
        }
        
        function stopFollowing() {
            followingObject = null;
        }
        
        function startFollowingObject(object) {
            followingObject = object;
            
            // Calculate appropriate follow distance based on object size
            if (object === sun) {
                followDistance = 30;
            } else if (object.userData.planetKey) {
                const data = planetData[object.userData.planetKey];
                followDistance = data ? data.radius * 8 : 20;
            } else if (object.userData.satelliteKey) {
                followDistance = 10;
            }
            
            // Initial camera positioning
            updateFollowingCamera();
        }
        
        function updateFollowingCamera() {
            if (!followingObject) return;
            
            const targetPosition = followingObject.position.clone();
            
            // Calculate camera position relative to the object
            const cameraPosition = new THREE.Vector3(
                targetPosition.x + followDistance,
                targetPosition.y + followDistance * 0.5,
                targetPosition.z + followDistance
            );
            
            // Smoothly move camera to follow the object
            camera.position.lerp(cameraPosition, 0.05);
            controls.target.lerp(targetPosition, 0.05);
        }
        
        function showSatelliteInfo(satelliteKey, x, y) {
            const data = satelliteData[satelliteKey];
            const infoDiv = document.getElementById('planetInfo');
            const nameDiv = document.getElementById('planetName');
            const detailsDiv = document.getElementById('planetDetails');
            
            nameDiv.textContent = data.name;
            
            let detailsHTML = '';
            Object.entries(data.info).forEach(([key, value]) => {
                const label = key.charAt(0).toUpperCase() + key.slice(1).replace('_', ' ');
                detailsHTML += `<div class="planet-detail"><strong>${label}:</strong> ${value}</div>`;
            });
            
            detailsDiv.innerHTML = detailsHTML;
            
            // Posicionar el panel cerca del cursor
            infoDiv.style.left = Math.min(x + 20, window.innerWidth - 370) + 'px';
            infoDiv.style.top = Math.min(y + 20, window.innerHeight - 300) + 'px';
            infoDiv.style.display = 'block';
        }
        
        function updateTimeSpeed(value) {
            timeSpeed = parseFloat(value);
            document.getElementById('speedValue').textContent = value + 'x';
        }
        
        function centerCameraOnObject(object) {
            const targetPosition = object.position.clone();
            
            // Calculate appropriate distance based on object size
            let distance = 20;
            if (object === sun) {
                distance = 30;
            } else if (object.userData.planetKey) {
                 const data = planetData[object.userData.planetKey];
                 distance = data ? data.radius * 8 : 20;
            } else if (object.userData.satelliteKey) {
                distance = 10;
            }
            
            // Set camera position relative to the object
            const cameraPosition = new THREE.Vector3(
                targetPosition.x + distance,
                targetPosition.y + distance * 0.5,
                targetPosition.z + distance
            );
            
            // Animate camera to new position
            animateCameraTo(cameraPosition, targetPosition);
        }
        
        function animateCameraTo(newPosition, lookAtTarget) {
            isAnimatingCamera = true;
            const startPosition = camera.position.clone();
            const startTarget = controls.target.clone();
            
            let progress = 0;
            const duration = 2000; // 2 seconds
            const startTime = Date.now();
            
            function updateCamera() {
                const elapsed = Date.now() - startTime;
                progress = Math.min(elapsed / duration, 1);
                
                // Smooth easing function
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                // Interpolate camera position
                camera.position.lerpVectors(startPosition, newPosition, easeProgress);
                
                // Interpolate look-at target
                const currentTarget = new THREE.Vector3();
                currentTarget.lerpVectors(startTarget, lookAtTarget, easeProgress);
                controls.target.copy(currentTarget);
                
                controls.update();
                
                if (progress < 1) {
                    requestAnimationFrame(updateCamera);
                } else {
                    isAnimatingCamera = false;
                }
            }
            
            updateCamera();
        }
        
        function toggleAnimation() {
            isAnimating = !isAnimating;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function initDragFunctionality() {
            const planetInfo = document.getElementById('planetInfo');
            const dragHeader = planetInfo.querySelector('.drag-header');
            
            dragHeader.addEventListener('mousedown', startDrag);
            planetInfo.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
        }
        
        function startDrag(e) {
            const planetInfo = document.getElementById('planetInfo');
            if (planetInfo.style.display === 'none') return;
            
            // Only start drag if clicking on the panel itself or drag header
            if (e.target.classList.contains('close')) return;
            
            isDragging = true;
            planetInfo.classList.add('dragging');
            
            const rect = planetInfo.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            
            e.preventDefault();
        }
        
        function drag(e) {
            if (!isDragging) return;
            
            const planetInfo = document.getElementById('planetInfo');
            const newX = e.clientX - dragOffset.x;
            const newY = e.clientY - dragOffset.y;
            
            // Keep panel within viewport bounds
            const maxX = window.innerWidth - planetInfo.offsetWidth;
            const maxY = window.innerHeight - planetInfo.offsetHeight;
            
            const clampedX = Math.max(0, Math.min(newX, maxX));
            const clampedY = Math.max(0, Math.min(newY, maxY));
            
            planetInfo.style.left = clampedX + 'px';
            planetInfo.style.top = clampedY + 'px';
            
            e.preventDefault();
        }
        
        function stopDrag() {
            if (isDragging) {
                isDragging = false;
                const planetInfo = document.getElementById('planetInfo');
                planetInfo.classList.remove('dragging');
            }
        }
        
        // Inicializar cuando se carga la página
        window.addEventListener('load', init);
    </script>
</body>
</html>
